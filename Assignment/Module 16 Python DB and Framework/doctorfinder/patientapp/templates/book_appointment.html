<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .booking-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .doctor-banner {
            background: var(--primary-gradient);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 30px;
            text-align: center;
        }
        .btn-pay {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-pay:hover {
            background: #219150;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card booking-card">
                    <div class="doctor-banner">
                        <i class="fa fa-user-md fa-4x mb-3"></i>
                        <h3>Book Dr. {{ doctor.firstname }}</h3>
                        <p class="mb-0">{{ doctor.specialization }} | {{ doctor.hospital }}</p>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            
                            {% if error %}
                            <div class="alert alert-danger text-center mb-4">
                                <i class="fa fa-exclamation-triangle me-2"></i> {{ error }}
                            </div>
                            {% endif %}

                            <div class="mb-4">
                                <label class="form-label fw-bold">Select Date</label>
                                <input type="date" name="date" class="form-control form-control-lg" required min="{{ today }}">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Select Time Slot</label>
                                <select name="time" class="form-select form-select-lg" required>
                                    <option value="">Choose a time...</option>
                                    <option value="09:00">09:00 AM</option>
                                    <option value="10:00">10:00 AM</option>
                                    <option value="11:00">11:00 AM</option>
                                    <option value="12:00">12:00 PM</option>
                                    <option value="14:00">02:00 PM</option>
                                    <option value="15:00">03:00 PM</option>
                                    <option value="16:00">04:00 PM</option>
                                    <option value="17:00">05:00 PM</option>
                                </select>
                            </div>
                            

                            <button type="submit" class="btn btn-pay">
                                Confirm Appointment <i class="fa fa-check-circle ms-2"></i>
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-transparent border-0 pb-4">
                        <a href="/doctors" class="text-muted text-decoration-none"><i class="fa fa-arrow-left me-1"></i> Back to List</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
