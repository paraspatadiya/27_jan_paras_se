<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-white: rgba(255, 255, 255, 0.9);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .auth-header {
            text-align: center;
            padding: 40px 30px 10px;
        }
        .brand-logo {
            font-size: 2.5rem;
            color: #4834d4;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
            margin-left: 5px;
        }
        .form-control {
            border-radius: 15px;
            padding: 12px;
            border: 2px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-auth {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(118, 75, 162, 0.3);
            color: white;
        }
    </style>
</head>
<body>

<div class="auth-card shadow-lg">
    <div class="auth-header">
        <div class="brand-logo">
            <i class="fa fa-user-plus"></i>
        </div>
        <h2 class="fw-bold mb-1">Create Account</h2>
        <p class="text-muted small">Join DoctorFinder to find the best care</p>
    </div>

    <div class="card-body p-4 p-md-5 pt-0">
        <form class="signup" id="signup_form" method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" 
                           name="{{ field.html_name }}" 
                           id="{{ field.id_for_label }}" 
                           class="form-control {% if field.errors %}is-invalid{% endif %}"
                           placeholder="Enter {{ field.label|lower }}"
                           {% if field.field.required %}required{% endif %}>
                    {% if field.errors %}
                        <div class="invalid-feedback ps-2">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button class="btn btn-auth w-100 mt-4" type="submit">
                Register Now <i class="fa fa-paper-plane ms-2 small"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="mb-0 text-muted small">Already have an account? <a href="{{ login_url }}" class="text-decoration-none fw-bold text-primary">Sign In</a></p>
        </div>
    </div>
</div>

</body>
</html>
