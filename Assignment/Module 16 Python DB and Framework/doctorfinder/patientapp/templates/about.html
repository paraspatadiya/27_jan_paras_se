<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .hero-section {
            background: var(--primary-gradient);
            color: white;
            padding: 80px 0;
            text-align: center;
        }
        .map-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: -50px;
            background: white;
            padding: 10px;
        }
        .contact-card {
            border: none;
            border-radius: 20px;
            transition: 0.3s;
        }
        .contact-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home">DoctorFinder</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/about">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold">Connecting You to Care</h1>
            <p class="lead">We are dedicated to making healthcare accessible and transparent.</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3671.697963351939!2d72.50367307604473!3d23.03487691583279!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e849646b96b01%3A0xe54d3e527d498a58!2sTops%20Technologies!5e0!3m2!1sen!2sin!4v1714732000000!5m2!1sen!2sin" 
                        width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>

        <div class="row mt-5 g-4 text-center">
            <div class="col-md-4">
                <div class="card p-4 contact-card shadow-sm">
                    <i class="fa fa-map-marker-alt fa-2x text-primary mb-3"></i>
                    <h5>Our Headquarters</h5>
                    <p class="text-muted">Ahmedabad, Gujarat, India</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 contact-card shadow-sm">
                    <i class="fa fa-phone fa-2x text-success mb-3"></i>
                    <h5>Call Us</h5>
                    <p class="text-muted">+91 98765 43210</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 contact-card shadow-sm">
                    <i class="fa fa-envelope fa-2x text-warning mb-3"></i>
                    <h5>Email Support</h5>
                    <p class="text-muted">contact@doctorfinder.com</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2026 DoctorFinder. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
