<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
        }
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .success-card {
            border: none;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            background: white;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .success-header {
            background: var(--primary-gradient);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .check-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-label {
            color: #7f8c8d;
            font-weight: 500;
        }
        .info-value {
            color: #2c3e50;
            font-weight: 700;
        }
        .btn-home {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover {
            transform: scale(1.05);
            color: white;
            box-shadow: 0 10px 20px rgba(0,176,155,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card success-card">
                    <div class="success-header">
                        <i class="fa fa-check-circle check-icon"></i>
                        <h2 class="fw-bold">Booking Confirmed!</h2>
                        <p class="mb-0">Your appointment has been successfully scheduled.</p>
                    </div>
                    <div class="card-body p-4 p-lg-5">
                        <div class="mb-4">
                            <div class="info-item">
                                <span class="info-label">Doctor</span>
                                <span class="info-value">Dr. {{ appointment.doctor.firstname }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date</span>
                                <span class="info-value">{{ appointment.date }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Time Slot</span>
                                <span class="info-value">{{ appointment.time }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Status</span>
                                <span class="info-value text-success">Confirmed</span>
                            </div>
                        </div>
                        
                        <div class="text-center">
                            <p class="text-muted small mb-4">A confirmation has been sent to your registered email.</p>
                            <a href="/home" class="btn btn-home">
                                <i class="fa fa-home me-2"></i> Go to Dashboard
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
