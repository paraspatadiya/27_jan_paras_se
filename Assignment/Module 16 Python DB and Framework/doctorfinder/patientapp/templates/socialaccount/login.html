<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Sign In | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-white: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            text-align: center;
        }
        .auth-header {
            padding: 40px 30px 20px;
        }
        .brand-logo {
            font-size: 3rem;
            color: #4834d4;
            margin-bottom: 20px;
        }
        .btn-continue {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
            color: white;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <div class="brand-logo">
            <i class="fab fa-google text-danger"></i>
        </div>
        <h2 class="fw-bold">Confirm Sign In</h2>
        
        {% load i18n %}
        {% load socialaccount %}

        <p class="text-muted mt-3">
            {% blocktrans with provider.name as provider_name %}You are about to sign in using your {{ provider_name }} account.{% endblocktrans %}
        </p>
    </div>

    <div class="card-body p-4 p-md-5 pt-0">
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-continue" type="submit">
                Continue to DoctorFinder <i class="fa fa-arrow-right ms-2 small"></i>
            </button>
        </form>
        
        <div class="mt-4">
            <a href="/accounts/login/" class="text-decoration-none text-muted small">Cancel and go back</a>
        </div>
    </div>
</div>

</body>
</html>
