{% load socialaccount %}
{% get_providers as socialaccount_providers %}

<div class="d-grid gap-3">
  {% for provider in socialaccount_providers %}
    {% if provider.id == "google" %}
      <a title="{{provider.name}}" class="btn btn-social btn-google" 
         href="{% provider_login_url provider.id process=process scope=scope auth_params=auth_params %}">
         <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" class="me-2">
         Continue with Google
      </a>
    {% elif provider.id == "facebook" %}
      <a title="{{provider.name}}" class="btn btn-social btn-facebook" 
         href="{% provider_login_url provider.id process=process scope=scope auth_params=auth_params %}">
         <i class="fab fa-facebook me-2"></i> Continue with Facebook
      </a>
    {% else %}
      <a title="{{provider.name}}" class="btn btn-social btn-other" 
         href="{% provider_login_url provider.id process=process scope=scope auth_params=auth_params %}">
         <i class="fab fa-{{provider.id}} me-2"></i> Continue with {{provider.name}}
      </a>
    {% endif %}
  {% endfor %}
</div>

<style>
    .btn-social {
        padding: 12px;
        border-radius: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
        border: 1px solid #eee;
        text-decoration: none;
        color: #333;
        background: white;
    }
    .btn-social:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        background: #fdfdfd;
        color: #000;
    }
    .btn-google {
        border-color: #eee;
    }
    .btn-facebook {
        background: #1877f2;
        color: white;
        border: none;
    }
    .btn-facebook:hover {
        background: #166fe5;
        color: white;
    }
    .btn-other {
        background: #333;
        color: white;
        border: none;
    }
    .btn-other:hover {
        background: #000;
        color: white;
    }
</style>
