<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-white: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }
        .auth-header {
            text-align: center;
            padding: 40px 30px 10px;
        }
        .brand-logo {
            font-size: 2.5rem;
            color: #4834d4;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }
        .form-control {
            border-radius: 15px;
            padding: 14px;
            border: 2px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
            color: white;
        }
        .btn-google {
            background: white;
            color: #444;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #ccc;
            transform: translateY(-2px);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #aaa;
            margin: 25px 0;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <div class="brand-logo">
            <i class="fa fa-stethoscope"></i>
        </div>
        <h2 class="fw-bold">Welcome Back</h2>
        <p class="text-muted small">Login to manage your appointments</p>
    </div>

    <div class="card-body p-4 p-md-5 pt-0">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button class="btn btn-login w-100 mb-3" type="submit">
                Login Securely <i class="fa fa-lock ms-2 small"></i>
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="mb-0 text-muted small">New patient? <a href="/signup/" class="text-decoration-none fw-bold text-primary">Create Account</a></p>
        </div>

        <div class="divider">OR CONTINUE WITH</div>

        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}" class="btn btn-google w-100 mb-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" class="me-2">
            Continue with Google
        </a>

        <div class="text-center">
            <a href="/adminapp/admin-login/" class="text-decoration-none text-muted small fw-bold">
                <i class="fa fa-user-shield me-1"></i> Admin Login
            </a>
        </div>
    </div>
</div>

</body>
</html>
