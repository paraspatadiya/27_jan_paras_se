<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Signup | DoctorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-white: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
        }
        .auth-header {
            text-align: center;
            padding: 40px 30px 10px;
        }
        .brand-logo {
            font-size: 2.5rem;
            color: #4834d4;
            margin-bottom: 10px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #636e72;
            text-transform: uppercase;
            margin-left: 5px;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-signup {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
            color: white;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <div class="brand-logo">
            <i class="fa fa-user-plus"></i>
        </div>
        <h2 class="fw-bold">Join DoctorFinder</h2>
        <p class="text-muted small">Register to find and book the best doctors near you</p>
    </div>

    <div class="card-body p-4 p-md-5 pt-0">
        <form method="POST" class="row g-4">
            {% csrf_token %}

            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="+91 9988776655" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Years" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option selected disabled value="">Select...</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" placeholder="Your City" required>
            </div>

            <div class="col-12">
                <button class="btn btn-signup w-100 shadow-sm" type="submit">
                    Create Patient Account <i class="fa fa-check-circle ms-2"></i>
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="mb-0 text-muted small">Already a member? <a href="/" class="text-decoration-none fw-bold text-primary">Login Here</a></p>
        </div>
    </div>
</div>

</body>
</html>
