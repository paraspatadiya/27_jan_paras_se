{% extends 'base.html' %}

{% block title %}Edit Comment - WriteSphere{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-5">
                <h3 class="mb-4 fw-bold">Edit Your Comment</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <textarea name="text" class="form-control" style="background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); color: var(--text-main);" rows="5" required>{{ comment.text }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <a href="/read/{{ comment.blog.id }}/" class="text-muted text-decoration-none">Cancel</a>
                        <button type="submit" class="btn btn-premium px-4">Update Comment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
