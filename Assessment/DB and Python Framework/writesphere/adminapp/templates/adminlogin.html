<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | WriteSphere</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.login-box {
    width: 100%;
    max-width: 400px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: white;
    text-align: center;
}

/* Heading */
h2 {
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

input:focus {
    box-shadow: 0 0 10px #4facfe;
    outline: none;
}

/* Button */
.btn-custom {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    background: white;
    color: #333;
    font-weight: bold;
    transition: 0.3s;
}

.btn-custom:hover {
    background: #000;
    color: white;
}

/* Error */
.error {
    margin-top: 10px;
    background: rgba(255,0,0,0.2);
    padding: 8px;
    border-radius: 8px;
    color: #ffdddd;
}

/* Back */
.back {
    margin-top: 15px;
}
.back a {
    color: #ddd;
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="login-box">

    <h2>🔐 Admin Login</h2>

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        
        <button type="submit" class="btn btn-custom">🚀 Login</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="back">
        <a href="/login/">← Back to User Login</a>
    </div>

</div>

</body>
</html>
